name: CI

# Quality gate: typecheck + production build on every push to main and every PR.
# (ESLint is not yet configured — `next lint` has no config — so it is intentionally
#  omitted here; add a lint step once eslint-config-next is set up.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: typecheck + build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Build must succeed without secrets (pages are dynamic; no prerender hits
          # the data layer). Real env is injected by Vercel on deploy.
          NEXT_TELEMETRY_DISABLED: '1'
